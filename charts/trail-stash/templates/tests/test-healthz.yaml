apiVersion: v1
kind: Pod
metadata:
  name: {{ include "trail-stash.fullname" . }}-test-healthz
  labels:
    {{- include "trail-stash.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: healthz
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          wget -q -T 5 -O- "http://{{ include "trail-stash.fullname" . }}:{{ .Values.service.port }}/healthz" && echo " OK"
