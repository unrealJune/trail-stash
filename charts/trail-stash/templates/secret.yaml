{{- /*
Render a Secret only when the user did NOT point us at an existing one.
secretKey is required in that case — fail loudly rather than boot an identity-less stash.
*/ -}}
{{- if not .Values.secret.existingSecret }}
{{- if not .Values.secret.secretKey }}
{{- fail "trail-stash: set secret.existingSecret to a Secret containing TRAIL_STASH_SECRET_KEY, or provide secret.secretKey (openssl rand -hex 32). The chart never auto-generates it — a random key each upgrade would rotate the dial ticket and break every client." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "trail-stash.fullname" . }}
  labels:
    {{- include "trail-stash.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.secret.keys.secretKey }}: {{ .Values.secret.secretKey | quote }}
  {{- if .Values.secret.psk }}
  {{ .Values.secret.keys.psk }}: {{ .Values.secret.psk | quote }}
  {{- end }}
  {{- if .Values.secret.apnsBearer }}
  {{ .Values.secret.keys.apnsBearer }}: {{ .Values.secret.apnsBearer | quote }}
  {{- end }}
  {{- if .Values.secret.fcmBearer }}
  {{ .Values.secret.keys.fcmBearer }}: {{ .Values.secret.fcmBearer | quote }}
  {{- end }}
  {{- if .Values.secret.relayToken }}
  {{ .Values.secret.keys.relayToken }}: {{ .Values.secret.relayToken | quote }}
  {{- end }}
{{- end }}
